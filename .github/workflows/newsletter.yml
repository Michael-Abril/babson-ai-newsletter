name: The AI Pulse | Weekly Newsletter

on:
  schedule:
    - cron: '0 15 * * 5'  # Friday 3PM UTC = 10AM EST
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - test
          - send

jobs:
  newsletter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.RESEND_API_KEY }}" ]; then
            echo "::error::RESEND_API_KEY secret is not set"
            exit 1
          fi
          echo "All required secrets are configured"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Validate links in generated content
        if: success()
        run: npm run validate:links || echo "::warning::Some links may be invalid"
        continue-on-error: true

      - name: Generate and deliver newsletter
        env:
          MODE: ${{ github.event.inputs.mode || (github.event_name == 'schedule' && 'send') || 'test' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
        run: npx tsx src/multi-agent.ts

      - name: Upload preview artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-preview
          path: output/
          if-no-files-found: ignore

      - name: Archive newsletter to editions
        if: github.event.inputs.mode == 'send' || github.event_name == 'schedule'
        run: |
          YEAR=$(date +%Y)
          WEEK=$(date +%V)
          DATE=$(date +%Y-%m-%d)
          mkdir -p editions/$YEAR
          cp output/*.html "editions/$YEAR/week-${WEEK}-${DATE}.html" 2>/dev/null || true
          cp output/*.json "editions/$YEAR/week-${WEEK}-${DATE}.json" 2>/dev/null || true
          cp editions/index.json editions/index.json 2>/dev/null || true
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add editions/
          git diff --staged --quiet || git commit -m "Archive edition: Week $WEEK ($DATE)"
          git push

      - name: Create failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Newsletter pipeline failed: ${date}`,
              body: `The AI Pulse newsletter pipeline failed on ${date}.\n\n**Run:** ${runUrl}\n\n**Trigger:** ${context.eventName}\n\nCheck the workflow logs for details.`,
              labels: ['bug', 'pipeline-failure']
            });
